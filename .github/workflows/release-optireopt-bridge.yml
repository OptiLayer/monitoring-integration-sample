name: Release OptiReOpt Bridge

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: devices/optireopt-bridge

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: devices/optireopt-bridge

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Rename binary
        run: cp target/release/optireopt-bridge.exe target/release/optireopt-bridge-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: devices/optireopt-bridge/target/release/optireopt-bridge-${{ github.ref_name }}.exe
