name: Release Horiba Test

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install horiba-sdk numpy pyinstaller

      - name: Bundle horiba_test.py
        run: pyinstaller --onefile --name horiba-test-${{ github.ref_name }} devices/horiba/horiba_test.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/horiba-test-${{ github.ref_name }}.exe
