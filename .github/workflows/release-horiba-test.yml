name: Release Horiba Test

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: devices/horiba
        run: uv sync

      - name: Bundle horiba_test.py
        working-directory: devices/horiba
        run: uv run pyinstaller --onefile --collect-data horiba_sdk --name horiba-test-${{ github.ref_name }} horiba_test.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: devices/horiba/dist/horiba-test-${{ github.ref_name }}.exe
