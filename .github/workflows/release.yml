name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: devices/atmega328p/spectrometer-service

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: devices/atmega328p/spectrometer-service

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Rename binary
        run: cp target/release/spectrometer-service.exe target/release/atmega328p-spectrometer-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: devices/atmega328p/spectrometer-service/target/release/atmega328p-spectrometer-${{ github.ref_name }}.exe
